app = "chomp-chomp-send"
primary_region = "ewr"

[env]
DATA_DIR = "/data"
PORT = "3000"

[[mounts]]
destination = "/data"
source = "send_data"

[[services]]
internal_port = 3_000
protocol = "tcp"

  [services.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = "connections"

  [[services.http_checks]]
  grace_period = "5s"
  interval = "15s"
  path = "/health"
  timeout = "5s"

  [[services.ports]]
  force_https = true
  handlers = [ "http" ]
  port = 80

  [[services.ports]]
  handlers = [ "tls", "http" ]
  port = 443
