app = "chomp-chomp-send"
primary_region = "ewr"  # Newark — change to your preferred region

[build]

[env]
  PORT = "3000"
  DATA_DIR = "/data"

[mounts]
  source = "send_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "5s"
    path = "/health"
